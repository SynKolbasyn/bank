global:
  scrape_interval: 1s
  evaluation_interval: 1s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:80']
    metrics_path: /metrics

  - job_name: 'processor'
    static_configs:
      - targets: ['processor:80']
    metrics_path: /metrics
