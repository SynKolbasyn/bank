on: [ push, pull_request ]

jobs:
  gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.2
          working-directory: gateway
  
  processor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.2
          working-directory: processor
