name: Test

on:
  push:
    branches: [main]

jobs:
  gateway:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./gateway/

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
      
      - name: Install dependencies
        run: go mod download
      
      - name: Test with coverage
        run: go test -race -cover ./config/... ./internal/... ./pkg/...
  
  processor:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./processor/

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.2
      
      - name: Install dependencies
        run: go mod download
      
      - name: Test with coverage
        run: go test -race -cover ./config/... ./internal/... ./pkg/...
