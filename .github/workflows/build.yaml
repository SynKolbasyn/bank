name: Build

on:
  push:
    branches: [main]

jobs:
  gateway:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Login to container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up buildx
        uses: docker/setup-buildx-action@v4

      - name: Build
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ./gateway/
          file: ./Dockerfile
          push: true
          tags: ghcr.io/synkolbasyn/bank:gateway
  
  processor:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Login to container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up buildx
        uses: docker/setup-buildx-action@v4

      - name: Build
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ./processor/
          file: ./Dockerfile
          push: true
          tags: ghcr.io/synkolbasyn/bank:processor
